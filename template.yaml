AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: USCF Affiliate Event Notifier — posts new tournament results to Discord

Globals:
  Function:
    Timeout: 120
    Runtime: nodejs24.x

Parameters:
  DiscordWebhookUrl:
    Type: String
    Description: Discord webhook URL for posting event notifications
    NoEcho: true

Resources:
  SentEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: uscf-sent-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH

  NotifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: src/
      Environment:
        Variables:
          DISCORD_WEBHOOK_URL: !Ref DiscordWebhookUrl
          SENT_EVENTS_TABLE: !Ref SentEventsTable
          SUBSCRIBED_AFFILIATES: 'A6033006,A9630067,A6037681,A7382640,T5007119,A9024602,A6039541,A7441719'
          # Player IDs:
          SUBSCRIBED_PLAYERS: '12598530,30916362,12814520,32637327,31886505,32568134,32628971,12936900,30072153,30258472,30250952,31575525,32777701,30461795,12905387,13083535,32443539,12836501,31944202,12593779,12548696,13974684,32531865,32654477,30380679,32818144,32570312,32818154,31630703,32563988'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SentEventsTable
      Events:
        HourlySchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Enabled: true

        # Monday 21:15–23:00 ET (EDT: Tue 01:15–03:00 UTC)
        MondayNightSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(15/5 1 ? * TUE *)
            Enabled: true
        MondayNightSchedule2:
          Type: Schedule
          Properties:
            Schedule: cron(0/5 2 ? * TUE *)
            Enabled: true
        MondayNightSchedule3:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 ? * TUE *)
            Enabled: true

        # Tuesday 21:15–23:00 ET (EDT: Wed 01:15–03:00 UTC)
        TuesdayNightSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(15/5 1 ? * WED *)
            Enabled: true
        TuesdayNightSchedule2:
          Type: Schedule
          Properties:
            Schedule: cron(0/5 2 ? * WED *)
            Enabled: true
        TuesdayNightSchedule3:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 ? * WED *)
            Enabled: true

        # Saturday 20:00–23:55 ET (EDT: Sun 00:00–03:55 UTC)
        SaturdayNightSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0/5 0 ? * SUN *)
            Enabled: true
        SaturdayNightSchedule2:
          Type: Schedule
          Properties:
            Schedule: cron(0/5 1 ? * SUN *)
            Enabled: true
        SaturdayNightSchedule3:
          Type: Schedule
          Properties:
            Schedule: cron(0/5 2 ? * SUN *)
            Enabled: true
        SaturdayNightSchedule4:
          Type: Schedule
          Properties:
            Schedule: cron(0/5 3 ? * SUN *)
            Enabled: true

        # Sunday 20:00–23:55 ET (EDT: Mon 00:00–03:55 UTC)
        SundayNightSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0/5 0 ? * MON *)
            Enabled: true
        SundayNightSchedule2:
          Type: Schedule
          Properties:
            Schedule: cron(0/5 1 ? * MON *)
            Enabled: true
        SundayNightSchedule3:
          Type: Schedule
          Properties:
            Schedule: cron(0/5 2 ? * MON *)
            Enabled: true
        SundayNightSchedule4:
          Type: Schedule
          Properties:
            Schedule: cron(0/5 3 ? * MON *)
            Enabled: true

Outputs:
  NotifierFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt NotifierFunction.Arn
  SentEventsTableName:
    Description: DynamoDB table name
    Value: !Ref SentEventsTable
